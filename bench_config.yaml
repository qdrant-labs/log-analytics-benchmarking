# single source of truth for search mode
index_mode: hybrid  # "vector" | "keyword" | "hybrid"

# how many logs to insert before measuring
pre_seed_logs: 100000

# phase durations (seconds)
steady_state_secs: 120       # baseline measurement without writes
heavy_write_secs: 180        # duration of concurrent write load
recovery_secs: 180           # post-write recovery measurement

# paths
results_dir: "./results"
logstorm_base: "./logstorm_base.yaml"

# shared qstorm settings (applied to all backends)
qstorm:
  queries_file: "./qstorm_configs/queries.yaml"
  warmup_iterations: 10
  burst_size: 100
  concurrency: 10
  timeout_ms: 5000
  top_k: 10
  embedding:
    model: "openai/text-embedding-3-small"
    dimensions: 1536

# backends to test (run simultaneously)
backends:
  - qdrant
  - elasticsearch
  - opensearch
  # - pgvector
