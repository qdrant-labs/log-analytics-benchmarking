# qstorm configuration for OpenSearch

provider:
  name: "opensearch-local"
  type: opensearch
  url: "https://localhost:9200"
  index_name: "logs"
  credentials:
    type: basic
    username: "admin"
    password: "SecureP@ssword1"
  text_field: "message"
  vector_field: "dense"

benchmark:
  mode:   # "vector" | "keyword" | "hybrid"
  warmup_iterations: 10
  burst_size: 100
  concurrency: 10
  timeout_ms: 5000
  top_k: 10

embedding:
    model: "openai/text-embedding-3-small"
    dimensions: 1536
