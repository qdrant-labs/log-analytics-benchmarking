buffer_size: 1000
flush_interval_ms: 3000
run_duration_secs: 0 # 0 means run indefinitely
message_pool_size: 1000

embedding:
  api_key: ${OPENAI_API_KEY}
  model: text-embedding-3-small
  dimensions: 1536

# sinks are generated at runtime from active backends + index_mode
# see logbench/generators.py

services:
  - name: api-gateway
    rate_per_sec: 75.0
    level_weights:
      debug: 0.1
      info: 0.7
      warn: 0.15
      error: 0.05

  - name: auth-service
    rate_per_sec: 20.0
    level_weights:
      debug: 0.05
      info: 0.6
      warn: 0.2
      error: 0.15

  - name: payment-service
    rate_per_sec: 5.0
    level_weights:
      debug: 0.05
      info: 0.5
      warn: 0.25
      error: 0.2

  - name: user-service
    rate_per_sec: 25.0
    level_weights:
      debug: 0.1
      info: 0.65
      warn: 0.15
      error: 0.1